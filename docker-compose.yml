version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: neuro_academy_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: neuro
      POSTGRES_PASSWORD: neuro_secret
      POSTGRES_DB: neuro_academy
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
